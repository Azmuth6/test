<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💖 من أنتِ؟</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="password.css"/>
</head>
<body>

<div id="cursor">💗</div>
<canvas id="heartsCanvas"></canvas>

<div class="card">
  <span class="lock-icon">🔐</span>
  <p class="subtitle">أجيبي على السؤالين عشان تدخلي 💕</p>

  <div class="field">
    <label>📅 تاريخ ميلادكِ</label>
    <input type="text" id="field1" placeholder="DD/MM/YYYY" maxlength="10" />
  </div>

  <div class="field">
    <label>💬 تاريخ يوم الاعتراف</label>
    <input type="text" id="field2" placeholder="DD/MM/YYYY" maxlength="10" />
  </div>

  <button class="enter-btn" onclick="checkPassword()">ادخلي ❤</button>
  <div id="errorMsg">❌ إجابة غلط، حاولي تاني 💔</div>
</div>

<div id="successOverlay">
  <div class="big">💖</div>
  <h2>أهلاً بكِ حبيبتي</h2>
  <p>جاري الدخول...</p>
</div>

<script src="password.js"></script>
</body>
</html>
